# Información del sitio
title: Mi Portfolio
email: unaign008@gmail.com
description: Portfolio de proyectos desarrollado con HTML y Jekyll.

# Configuración de URLs (Esto quita las fechas de los enlaces)
permalink: /proyectos/:title/

# Excluir archivos que no queremos que se "limpien" o procesen
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - .sass-cache

# Reemplaza 'mi-repo' por el nombre exacto de tu repositorio en GitHub
baseurl: "/portfolio"
url: "https://uunaign.github.io"
