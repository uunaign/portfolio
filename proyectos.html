<!DOCTYPE html>
<html lang="es" class="full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>unaign.xyz</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="img/EARTH.png" type="image/png">

</head>

<body>
    <header>
        <div id="header-container">
            <a href="index.html"><img id="header-logo" src="img/LOGO.png" alt="logo"></a>
            <img id="header-url" src="img/URL.png" alt="url">
        </div>
    </header>
    <main class="full-main">
        <div id="main-category">
            <div id="hero-category">
                <img id="title-category" src="img/PROYECTOS.png" alt="Unai Garcia">
            </div>
            <div class="grid-proyectos">

                <a href="https://github.com/uunaign/President-Guesser"><div class="proyect-container">
                    <img class="proyect-image" src="element-images/PRESIDENT-GUESSER.png" alt="president-guesser">
                    <div id="info">
                        <h1 class="proyect-title">President guesser</h1>
                        <p>Adivina en que presidente estas pensando usando un algoritmo basado en la maximización de la ganancia de información (Information Gain).</p>
                    </div>
                </div></a>
                <a href="https://uunaign.github.io/VIAL-APP/index.html"><div class="proyect-container">
                    <img class="proyect-image" src="element-images/VIAL-APP-OPENER.png" alt="vial-app-opener">
                    <div id="info">
                        <h1 class="proyect-title">VIAL APP OPENER</h1>
                        <p>Gestiona tus teclas F13-F24 para abrir programas instantáneamente.</p>
                    </div>
                </div></a>
                <a href="https://uunaign.github.io/Calculadora-HTML/"><div class="proyect-container">
                    <img class="proyect-image" src="element-images/CALCULADORA.png" alt="calculadora-js">
                    <div id="info">
                        <h1 class="proyect-title">CALCULADORA</h1>
                        <p>Calculadora basica en HTML, CSS y JS.</p>
                    </div>
                </div></a>
            </div>
            <div class="spacer"></div>
        </div>

    </main>
</body>

</html>
